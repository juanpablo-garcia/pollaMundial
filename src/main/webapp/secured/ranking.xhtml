<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:c="http://java.sun.com/jsp/jstl/core"
	xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
	<title>Copa Mundial 2026 — Ranking</title>
	<meta name="viewport"
		content="width=device-width, initial-scale=1, user-scalable=no" />
	<h:outputStylesheet library="css" name="secured.css" />
	<c:if test="#{bean_Theme.blue}">
		<h:outputStylesheet library="css" name="theme-blue.css" />
	</c:if>
	<h:outputScript library="primefaces" name="chartjs/chartjs.js" target="head" />
	<h:outputScript library="js" name="ranking.js" target="head" />
</h:head>

<h:body>
	<p:growl autoUpdate="true" />

	<p:menubar>
		<p:menuitem value="Mis Marcadores" url="marcadores.xhtml" />
		<p:menuitem value="Resultados" url="resultados.xhtml" />
		<p:menuitem value="Ranking" url="ranking.xhtml" />
		<p:menuitem value="Puntos" url="../puntos.xhtml" icon="pi pi-info-circle" />
		<f:facet name="options">
			<h:form>
				<p:commandButton value="Logout" action="/"
					actionListener="#{bean_Resultados.bean_User.cerrarSession}"
					icon="pi pi-sign-out" />
			</h:form>
		</f:facet>
	</p:menubar>

	<div class="app-content">
		<p:panel header="Copa Mundial 2026 — Ranking">
			<p:tabView dynamic="true">
				<p:ajax event="tabChange" oncomplete="initRankingChart()" />

				<!-- ══════════════════════════════════════════
				     PESTAÑA: FIXTURE
				     ══════════════════════════════════════════ -->
				<p:tab title="Fixture">
					<h:form>
						<p:dataTable reflow="true" var="pgrupo"
							value="#{bean_Ranking.partidosReales}" styleClass="ranking-table">
							<p:column>
								<h:graphicImage alt="img" library="images"
									rendered="#{!empty pgrupo.eq1}"
									name="#{pgrupo.eq1.atributos['nombre'].replace(' ','_')}.png" />
							</p:column>
							<p:column>
								<p:outputLabel rendered="#{empty pgrupo.eq1}"
									value="#{pgrupo.atributos['eq1']}" />
								<p:outputLabel rendered="#{!empty pgrupo.eq1}"
									value="#{pgrupo.eq1.atributos['nombre']}" />
							</p:column>
							<p:column>
								<h:graphicImage alt="img" library="images"
									rendered="#{!empty pgrupo.eq2}"
									name="#{pgrupo.eq2.atributos['nombre'].replace(' ','_')}.png" />
							</p:column>
							<p:column>
								<p:outputLabel rendered="#{empty pgrupo.eq2}"
									value="#{pgrupo.atributos['eq2']}" />
								<p:outputLabel rendered="#{!empty pgrupo.eq2}"
									value="#{pgrupo.eq2.atributos['nombre']}" />
							</p:column>
							<p:column headerText="Resultado">
								<p:outputLabel rendered="#{pgrupo.realizado}"
									styleClass="marcador-real"
									value="#{pgrupo.goles1} - #{pgrupo.goles2}" />
							</p:column>
							<p:columns var="pusuario" value="#{bean_Ranking.columnas}">
								<f:facet name="header">
									<p:outputLabel value="#{pusuario}" />
								</f:facet>
								<p:outputLabel
									style="background-color:#{bean_Ranking.getColor(pusuario,pgrupo)};border-radius:4px;padding:3px 8px;"
									value="#{bean_Ranking.getResultado(pusuario,pgrupo)}" />
							</p:columns>
						</p:dataTable>
					</h:form>
				</p:tab>

				<!-- ══════════════════════════════════════════
				     PESTAÑA: GRÁFICA
				     ══════════════════════════════════════════ -->
				<p:tab title="Gráfica">
					<h:form id="chartForm" style="display:none">
						<h:inputHidden id="chartJson" value="#{bean_Ranking.chartDataJson}" />
					</h:form>
					<canvas id="rankingChart" style="width:100%;height:500px;"></canvas>
				</p:tab>

			</p:tabView>
		</p:panel>
	</div>

</h:body>
</html>
