<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
	xmlns:h="http://java.sun.com/jsf/html"
	xmlns:p="http://primefaces.org/ui"
	xmlns:c="http://java.sun.com/jsp/jstl/core"
	xmlns:f="http://xmlns.jcp.org/jsf/core">

<h:head>
	<title>Copa Mundial 2026 — Resultados</title>
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<h:outputStylesheet library="css" name="secured.css" />
	<c:if test="#{bean_Theme.blue}">
		<h:outputStylesheet library="css" name="theme-blue.css" />
	</c:if>
</h:head>

<h:body>
	<p:growl autoUpdate="true" />
	<h:form>

		<p:menubar>
			<p:menuitem value="Mis Marcadores" url="marcadores.xhtml" />
			<p:menuitem value="Resultados"     url="resultados.xhtml" />
			<p:menuitem value="Ranking"        url="ranking.xhtml" />
			<p:menuitem value="Puntos" url="../puntos.xhtml" icon="pi pi-info-circle" />
			<f:facet name="options">
				<p:commandButton value="Logout" action="/"
					actionListener="#{bean_Resultados.bean_User.cerrarSession}"
					icon="pi pi-sign-out" />
			</f:facet>
		</p:menubar>

		<div class="app-content">
			<p:panel header="Copa Mundial 2026 — Marcadores por Jugador">
				<p:dataList value="#{bean_Resultados.usuarios}" var="usuario"
					styleClass="jugadores-lista" itemType="none">
					<div class="jugador-item">
						<div class="jugador-avatar">
							#{usuario.atributos['nombre'].substring(0,1).toUpperCase()}
						</div>
						<p:link styleClass="jugador-nombre"
							value="#{usuario.atributos['nombre']}"
							href="marcadores.xhtml?id=#{usuario.id}" />
					</div>
				</p:dataList>
			</p:panel>
		</div>

	</h:form>
</h:body>
</html>
